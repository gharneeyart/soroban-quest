<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Soroban Quest — A gamified learning platform for Soroban smart contracts on Stellar. Write, test, and master Soroban in your browser." />
  <title>Soroban Quest — Master Soroban Smart Contracts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <script>
    (function () {
      try {
        let savedTheme = localStorage.getItem('soroban_quest_theme');
        if (savedTheme) {
          document.documentElement.setAttribute('data-theme', savedTheme);
        } else {
          let prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
          if (prefersLight) {
            document.documentElement.setAttribute('data-theme', 'light');
          }
        }
      } catch (e) { }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
